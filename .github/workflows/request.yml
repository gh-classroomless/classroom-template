name: request

# ⚠️ Triggers/auto-writes: read playbook/automation-map.md before changing 'on:' or adding a commit-back.
#    (GITHUB_TOKEN commits don't re-trigger workflows; ORG_PAT/PAT commits DO → loop risk.)

on:
  issues:
    types: [opened]

permissions:
  contents: write   # commit log/<repo>.json
  issues: write     # comment + close

# per-issue (not per-user): different assignments → different repos → safe to run in parallel.
# (per-user would queue then cancel a student's simultaneous A00+A22 — one would be silently dropped.)
concurrency:
  group: request-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  request:
    if: startsWith(github.event.issue.title, 'request-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Process request
        env:
          # in-repo ops (comment/close/log commit) use the auto token; cross-repo (create/collab) uses ORG_PAT
          GH_TOKEN: ${{ github.token }}
          ORG_PAT: ${{ secrets.ORG_PAT }}
          GH_REPO: ${{ github.repository }}
          ORG: ${{ github.repository_owner }}
          ISSUE: ${{ github.event.issue.number }}
          USERNAME: ${{ github.event.issue.user.login }}
          TITLE: ${{ github.event.issue.title }}
          BODY: ${{ github.event.issue.body }}
        run: |
          set -euo pipefail

          field() {
            printf '%s\n' "$BODY" | awk -v lbl="### $1" '
              $0==lbl {f=1; next}
              f && NF {gsub(/\r/,""); print; exit}
            '
          }
          # close (not delete): the success comment carries the student's repo + invite link — keep it visible.
          # request issues hold no PII (just the assignment); residual exposure = username + assignment (proportionate).
          fail() { gh issue comment "$ISSUE" --body "$1"; gh issue close "$ISSUE"; exit 0; }

          UKEY="$(printf '%s' "$USERNAME" | tr '[:upper:]' '[:lower:]')"
          # course from title prefix "request-<course>:" (no course hardcoded, #17)
          COURSE="$(printf '%s' "$TITLE" | sed -n 's/^request-\([^:]*\):.*/\1/p')"
          ASSIGN="$(field Assignment)"

          [ -n "$COURSE" ] || fail "❌ Could not read the course from the issue title. Use the course's Request link from Canvas."

          # per-school deploy: this repo carries its OWN single config.json (stamped from the template)
          CONFIG="config.json"
          [ -f "$CONFIG" ] || fail "⚠️ Setup error: this repo has no config.json yet (instructor: add it after deploy)."

          jq -e --arg c "$COURSE" '.courses[$c]' "$CONFIG" >/dev/null 2>&1 \
            || fail "❌ Unknown course \`$COURSE\`."

          # --- must be registered (roster lives in the PRIVATE data repo, read via ORG_PAT) ---
          DATA_REPO="${GH_REPO}-admin"
          ROSTER="$(GH_TOKEN="$ORG_PAT" gh api "repos/$DATA_REPO/contents/roster/$UKEY.json" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null || true)"
          [ -n "$ROSTER" ] \
            || fail "❌ You're not registered yet. Register first: https://github.com/$GH_REPO/issues/new?template=01-register.yml (use your Canvas class code), then request again."

          # --- assignment must be in config; value = template string (always open) OR object with time gate ---
          ENTRY="$(jq -c --arg c "$COURSE" --arg a "$ASSIGN" '.courses[$c].assignments[$a] // empty' "$CONFIG")"
          [ -n "$ENTRY" ] || fail "❌ Assignment \`$ASSIGN\` is not offered for $COURSE."

          if [ "$(jq -r 'type' <<<"$ENTRY")" = "string" ]; then
            TEMPLATE="$(jq -r '.' <<<"$ENTRY")"          # plain assignment — always available
          else
            TEMPLATE="$(jq -r '.template' <<<"$ENTRY")"  # gated assignment (e.g. exam/quiz)
            FROM="$(jq -r '.available_from // empty' <<<"$ENTRY")"
            UNTIL="$(jq -r '.available_until // empty' <<<"$ENTRY")"
            NOW="$(date -u +%s)"
            if [ -n "$FROM" ] && [ "$NOW" -lt "$(date -d "$FROM" +%s)" ]; then
              fail "⏳ \`$ASSIGN\` is not open yet — opens **$FROM**. Request again then."
            fi
            if [ -n "$UNTIL" ] && [ "$NOW" -gt "$(date -d "$UNTIL" +%s)" ]; then
              fail "🔒 \`$ASSIGN\` is closed (was open until **$UNTIL**)."
            fi
          fi
          [ -n "$TEMPLATE" ] && [ "$TEMPLATE" != "null" ] \
            || fail "⚠️ Setup error: assignment \`$ASSIGN\` has no template in config."

          SEM="$(jq -r --arg c "$COURSE" '.courses[$c].semester' "$CONFIG")"
          # pattern is OPTIONAL — default uses {course} so a hand-edited config can't hardcode the wrong
          # prefix (e.g. copying cs120's block for cs130). {course} is substituted from the parsed course.
          PATTERN="$(jq -r --arg c "$COURSE" '.courses[$c].student_repo_pattern // "{course}-{semester}-{assignment}-{username}"' "$CONFIG")"
          REPO="$PATTERN"
          REPO="${REPO//\{course\}/$COURSE}"
          REPO="${REPO//\{semester\}/$SEM}"
          REPO="${REPO//\{assignment\}/$ASSIGN}"
          REPO="${REPO//\{username\}/$UKEY}"

          NAME="$(jq -r '.name' <<<"$ROSTER")"
          EMAIL="$(jq -r '.email' <<<"$ROSTER")"

          # --- create repo from template (idempotent); cross-repo → ORG_PAT ---
          if GH_TOKEN="$ORG_PAT" gh repo view "$ORG/$REPO" >/dev/null 2>&1; then
            EXISTED=1   # idempotent — repo already there, just return the existing link
          else
            EXISTED=0
            # Template must EXIST and be marked a template repo — `gh repo create --template` requires it.
            # Check up front so a mis-set template reports the reason via fail(), instead of crashing under
            # `set -e` at the create line (which left the issue silently Open with no comment).
            IS_TPL="$(GH_TOKEN="$ORG_PAT" gh repo view "$ORG/$TEMPLATE" --json isTemplate --jq .isTemplate 2>/dev/null || echo missing)"
            case "$IS_TPL" in
              true)  : ;;
              false) fail "❌ Could not create your repo: \`$ORG/$TEMPLATE\` is not a template repository." ;;
              *)     fail "❌ Could not create your repo: template \`$ORG/$TEMPLATE\` was not found." ;;
            esac
            GH_TOKEN="$ORG_PAT" gh repo create "$ORG/$REPO" --template "$ORG/$TEMPLATE" --private \
              || fail "❌ Could not create your repo from \`$ORG/$TEMPLATE\`."
          fi

          # --- ensure student is an outside collaborator (push); sends invite ---
          GH_TOKEN="$ORG_PAT" gh api -X PUT "repos/$ORG/$REPO/collaborators/$USERNAME" -f permission=push >/dev/null

          # --- write log to the PRIVATE data repo (Contents API, ORG_PAT; PII not in public hub) ---
          STAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LOG_B64="$(jq -n --arg t "$STAMP" --arg u "$UKEY" --arg n "$NAME" --arg e "$EMAIL" \
                --arg c "$COURSE" --arg a "$ASSIGN" --arg s "$SEM" --arg r "$REPO" \
            '{time:$t, username:$u, name:$n, email:$e, course:$c, assignment:$a, semester:$s, repo:$r}' | base64 -w0)"
          LSHA="$(GH_TOKEN="$ORG_PAT" gh api "repos/$DATA_REPO/contents/log/$REPO.json" --jq .sha 2>/dev/null || true)"
          GH_TOKEN="$ORG_PAT" gh api -X PUT "repos/$DATA_REPO/contents/log/$REPO.json" \
            -f message="request: $REPO" -f content="$LOG_B64" ${LSHA:+-f sha="$LSHA"} >/dev/null

          # rename the issue so the Closed list is self-identifying (each student sees their own)
          gh issue edit "$ISSUE" --title "request-${COURSE}: ${ASSIGN} — @${USERNAME}" >/dev/null 2>&1 || true

          if [ "${EXISTED:-0}" = "1" ]; then
            LEAD='ℹ️ You already have this repo — returning your existing link (nothing new was created).'
          else
            LEAD='✅ Repo created.'
          fi
          MSG="$(printf '%s\nRepo: https://github.com/%s/%s\n👉 Accept the invite: https://github.com/%s/%s/invitations\nThen clone: `gh repo clone %s/%s`' "$LEAD" "$ORG" "$REPO" "$ORG" "$REPO" "$ORG" "$REPO")"
          gh issue comment "$ISSUE" --body "$MSG"
          gh issue close "$ISSUE"
